<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FARDA — Sistema de Pricing</title>
<style>
  :root { --bg: #0c0b0b; --bg-alt: #17140f; --border: #3a332a; --text-main: #eae6e0; --text-sec: #a8a09a; --text-ter: #7a7167; --teal: #b2a79a; --teal-dark: #665640; --amber: #e67e22; --red: #c0392b; --green: #27ae60; --warn-bg: #fff3cd; --warn-text: #856404; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; line-height: 1.6; }
  .app { display: grid; grid-template-rows: 60px auto 1fr; height: 100vh; }
  .topbar { background: var(--bg-alt); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; border-bottom: 1px solid var(--border); }
  .tabs { background: var(--bg-alt); display: flex; border-bottom: 1px solid var(--border); padding: 0 32px; }
  .tab-btn { background: transparent; border: none; color: var(--text-sec); padding: 16px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .tab-btn:hover { color: var(--text-main); border-bottom-color: var(--teal); }
  .tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }
  .main { overflow-y: auto; padding: 32px; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
  .section { display: none; }
  .section.active { display: block; }
  .header { margin-bottom: 24px; }
  .title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { font-size: 13px; color: var(--text-sec); }
  .crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 16px; flex-wrap: wrap; }
  .crumb { cursor: pointer; color: var(--teal); }
  .crumb:hover { text-decoration: underline; }
  .crumb.active { color: var(--text-main); cursor: default; font-weight: 600; }
  .crumb-sep { color: var(--text-ter); }
  .back-btn { background: var(--bg-alt); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; }
  .back-btn:hover { border-color: var(--teal); color: var(--teal); }
  .table-container { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-ter); padding: 12px 16px; text-align: left; background: var(--bg-alt); border-bottom: 1px solid var(--border); font-weight: 600; }
  th.right { text-align: right; }
  th.center { text-align: center; }
  td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(255,255,255,0.02); }
  .td-name { color: var(--teal); cursor: pointer; font-weight: 500; }
  .td-name:hover { text-decoration: underline; }
  .td-name.disabled { color: var(--text-sec); cursor: default; }
  .td-name.disabled:hover { text-decoration: none; }
  .td-num { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-main); }
  .td-center { text-align: center; }
  .fc-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; }
  .fc-ok { background: rgba(39,174,96,0.15); color: #2ecc71; }
  .fc-warn { background: rgba(230,126,34,0.15); color: var(--amber); }
  .fc-bad { background: rgba(192,57,43,0.15); color: var(--red); }
  .fc-none { background: rgba(120,120,120,0.2); color: var(--text-sec); }
  .sim-cell { display: flex; gap: 8px; align-items: center; }
  .sim-input { background: var(--border); border: 1px solid var(--border); color: var(--text-main); padding: 6px 10px; border-radius: 4px; font-size: 12px; width: 110px; text-align: right; outline: none; }
  .sim-input:focus { border-color: var(--teal); }
  .sim-fc { font-size: 12px; font-weight: 700; min-width: 60px; text-align: right; }
  .detail-panel { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 20px; }
  .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: var(--text-main); }
  .detail-meta { font-size: 12px; color: var(--text-sec); margin-bottom: 16px; }
  .cost-summary { display: flex; gap: 24px; flex-wrap: wrap; padding: 16px; background: var(--bg); border-radius: 6px; margin-bottom: 20px; }
  .cost-item-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-ter); margin-bottom: 4px; }
  .cost-item-value { font-size: 20px; font-weight: 700; color: var(--text-main); }
  .cost-item-value.teal { color: var(--teal); }
  .ing-table { width: 100%; margin-top: 12px; }
  .ing-table th { padding: 10px 14px; font-size: 10px; border-bottom: 1px solid var(--border); }
  .ing-table td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
  .ing-name { color: var(--text-main); }
  .ing-name.clickable { color: var(--teal); cursor: pointer; }
  .ing-name.clickable:hover { text-decoration: underline; }
  .ing-qty { text-align: right; color: var(--text-sec); }
  .ing-cost { text-align: right; color: var(--text-main); font-weight: 500; }
  .ing-prod-tag { display: inline-block; background: rgba(178,167,154,0.2); color: var(--teal); padding: 1px 6px; border-radius: 3px; font-size: 9px; margin-left: 6px; vertical-align: middle; }
  .qty-bruta { font-size: 10px; color: var(--amber); display: block; }
  .usable-price { font-size: 10px; color: var(--amber); display: block; margin-top: 2px; }
  .rend-toggle { display: flex; align-items: center; gap: 6px; justify-content: center; }
  .switch { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .2s; border-radius: 18px; }
  .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: var(--text-sec); transition: .2s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--teal); }
  input:checked + .slider:before { transform: translateX(16px); background-color: white; }
  .rend-input-inline { background: var(--border); border: 1px solid var(--border); color: var(--text-main); padding: 4px 6px; border-radius: 4px; font-size: 11px; width: 50px; text-align: right; outline: none; }
  .rend-input-inline:focus { border-color: var(--teal); }
  .rend-input-inline:disabled { opacity: 0.3; }
  .cat-header { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--teal); margin: 24px 0 16px; display: flex; align-items: center; gap: 12px; }
  .cat-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .btn { background: var(--teal); color: var(--bg); border: none; padding: 8px 16px; border-radius: 4px; font-size: 12px; font-weight: 700; cursor: pointer; outline: none; }
  .btn:hover { opacity: 0.9; }
  .iva-buttons { display: flex; gap: 8px; }
  .iva-btn { background: transparent; border: 1px solid var(--border); color: var(--text-sec); padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .iva-btn:hover { border-color: var(--teal); color: var(--teal); }
  .iva-btn.active { background: var(--teal); border-color: var(--teal); color: var(--bg); }
  .ins-input { background: var(--border); border: 1px solid var(--border); color: var(--text-main); padding: 5px 8px; border-radius: 4px; font-size: 11px; width: 110px; text-align: right; outline: none; }
  .ins-input:focus { border-color: var(--teal); }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .login-box { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px; padding: 32px; width: 300px; }
  .login-box .logo { margin-bottom: 20px; text-align: center; color: var(--teal); }
  .login-box input { width: 100%; background: var(--border); border: 1px solid var(--border); color: var(--text-main); padding: 10px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: var(--teal); }
  .login-box .btn { width: 100%; padding: 10px; font-size: 13px; }
  .login-error { color: var(--red); font-size: 12px; margin-bottom: 12px; min-height: 16px; }
  .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--text-sec); padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }
  .save-status { font-size: 11px; color: var(--text-ter); margin-right: 12px; }
</style>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="logo">FARDA</div>
    <div class="login-error" id="login-error"></div>
    <input type="email" id="login-email" placeholder="Email" autocomplete="username">
    <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn" onclick="window.__doLogin(document.getElementById('login-email').value, document.getElementById('login-password').value)">Ingresar</button>
  </div>
</div>
<div class="app" style="display:none;">
<div class="topbar"><div class="logo">FARDA</div><div><span class="save-status" id="save-status"></span><button class="logout-btn" onclick="window.__doLogout()">Cerrar sesión</button></div></div>
<div class="tabs">
  <button class="tab-btn active" data-tab="platos" onclick="switchTab('platos')">PLATOS</button>
  <button class="tab-btn" data-tab="recetas" onclick="switchTab('recetas')">RECETAS</button>
  <button class="tab-btn" data-tab="producciones" onclick="switchTab('producciones')">PRODUCCIONES</button>
  <button class="tab-btn" data-tab="rendimientos" onclick="switchTab('rendimientos')">RENDIMIENTOS</button>
  <button class="tab-btn" data-tab="insumos" onclick="switchTab('insumos')">INSUMOS</button>
  <button class="tab-btn" data-tab="exportar" onclick="switchTab('exportar')">EXPORTAR</button>
</div>
<div class="main">
  <div id="platos-section" class="section active"></div>
  <div id="recetas-section" class="section"></div>
  <div id="producciones-section" class="section"></div>
  <div id="rendimientos-section" class="section"></div>
  <div id="insumos-section" class="section"></div>
  <div id="exportar-section" class="section"></div>
</div>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // La seguridad la dan las políticas de Row Level Security + el login,
  // no el secreto de estos valores (la anon key está pensada para ser pública).
  const SUPABASE_URL = "https://snwuddryxaehunxbyflp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNud3VkZHJ5eGFlaHVueGJ5ZmxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MDU0ODMsImV4cCI6MjA5ODQ4MTQ4M30.8OO53huAHhFBcLe07aMiA7RWTZ2igQ8r2NfTTH7yFcM";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // TODO: volver a poner en `true` cuando el login de Supabase esté andando
  // (ver supabase_temp_disable_login.sql para revertir el acceso sin login).
  const REQUIRE_LOGIN = false;

  window.__doLogin = async function (email, password) {
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Completá email y contraseña.'; return; }
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) errEl.textContent = 'Usuario o contraseña incorrectos.';
  };

  window.__doLogout = function () { supabase.auth.signOut(); };

  // Se pone en true solo si la carga inicial desde Supabase funcionó. Si es
  // false, __saveState se niega a guardar — así una lectura fallida (ej. corte
  // de red) nunca termina sobreescribiendo datos reales con un estado vacío.
  let loadedOk = false;
  // Timestamp de la versión que esta pestaña tiene cargada. Si otra pestaña/
  // dispositivo guardó algo más nuevo mientras tanto, avisamos antes de pisarlo.
  let loadedUpdatedAt = null;

  window.__saveState = async function (state) {
    const status = document.getElementById('save-status');
    if (!loadedOk) {
      console.error('Guardado bloqueado: la carga inicial de datos falló, recargá la página antes de editar.');
      if (status) status.textContent = 'No guardado — recargá la página';
      return;
    }
    const check = await supabase.from('pricing_state').select('updated_at').eq('id', 1).maybeSingle();
    const remoteMs = check.data && check.data.updated_at ? new Date(check.data.updated_at).getTime() : null;
    const loadedMs = loadedUpdatedAt ? new Date(loadedUpdatedAt).getTime() : null;
    // Más de 1s de diferencia = lo guardó otra pestaña/dispositivo de verdad
    // (no solo una diferencia de formato al ida-y-vuelta con la base).
    if (loadedMs && remoteMs && Math.abs(remoteMs - loadedMs) > 1000) {
      const seguir = confirm('Esta pestaña tiene datos desactualizados: alguien (u otra pestaña tuya) guardó cambios más nuevos en la nube. Si guardás ahora, los vas a pisar.\n\nCancelar y recargar la página es lo más seguro. ¿Guardar igual?');
      if (!seguir) {
        if (status) status.textContent = 'No guardado — recargá la página';
        return;
      }
    }
    if (status) status.textContent = 'Guardando…';
    const { data: saved, error } = await supabase
      .from('pricing_state')
      .upsert({
        id: 1,
        insumos: state.insumos,
        rendimientos: state.rendimientos,
        recetas: state.recetas,
        prod_rinde: state.prodRinde,
        platos_extra: state.platosExtra,
        producciones_extra: state.produccionesExtra,
        receta_rendimientos: state.recetaRendimientos,
        platos_deleted: state.platosDeleted,
        producciones_deleted: state.produccionesDeleted,
        insumos_extra: state.insumosExtra,
        insumos_deleted: state.insumosDeleted,
        updated_at: new Date().toISOString()
      })
      .select('updated_at')
      .single();
    if (error) {
      console.error('No se pudo guardar en la nube', error);
      if (status) status.textContent = 'Error al guardar';
    } else {
      // Guardamos el valor tal como lo devolvió la base (no el que generamos
      // acá), para comparar siempre "manzanas con manzanas" la próxima vez.
      loadedUpdatedAt = saved ? saved.updated_at : new Date().toISOString();
      window.__saveDirty = false;
      if (status) status.textContent = 'Guardado ✓';
    }
  };

  window.addEventListener('beforeunload', function (e) {
    if (window.__saveDirty) {
      e.preventDefault();
      e.returnValue = '';
    }
  });

  document.getElementById('login-password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.__doLogin(document.getElementById('login-email').value, document.getElementById('login-password').value);
  });

  function showLoadError() {
    document.getElementById('login-screen').style.display = 'none';
    document.querySelector('.app').style.display = 'none';
    const el = document.createElement('div');
    el.style.cssText = 'max-width:500px;margin:80px auto;padding:24px;background:var(--bg-alt);border:1px solid var(--red);border-radius:8px;color:var(--text-main);font-size:14px;line-height:1.6;';
    el.innerHTML = '<b style="color:var(--red);">No se pudieron cargar los datos guardados.</b><br>No edites nada todavía — recargá la página (F5). Si el problema sigue, avisá antes de seguir usando la app, para no arriesgarte a perder datos guardados.';
    document.body.appendChild(el);
  }

  async function loadAndStart() {
    const res = await supabase.from('pricing_state').select('insumos, rendimientos, recetas, prod_rinde, platos_extra, producciones_extra, receta_rendimientos, platos_deleted, producciones_deleted, insumos_extra, insumos_deleted, updated_at').eq('id', 1).maybeSingle();
    if (res.error) {
      console.error('No se pudo leer de la nube', res.error);
      loadedOk = false;
      showLoadError();
      return;
    }
    loadedOk = true;
    const data = res.data || {};
    loadedUpdatedAt = data.updated_at || null;
    window.startApp({
      insumos: data.insumos || {},
      rendimientos: data.rendimientos || {},
      recetas: data.recetas || {},
      prodRinde: data.prod_rinde || {},
      platosExtra: data.platos_extra || [],
      produccionesExtra: data.producciones_extra || [],
      recetaRendimientos: data.receta_rendimientos || {},
      platosDeleted: data.platos_deleted || [],
      produccionesDeleted: data.producciones_deleted || [],
      insumosExtra: data.insumos_extra || [],
      insumosDeleted: data.insumos_deleted || []
    });
  }

  if (REQUIRE_LOGIN) {
    supabase.auth.onAuthStateChange(async (_event, session) => {
      const loginScreen = document.getElementById('login-screen');
      const appEl = document.querySelector('.app');
      if (session) {
        loginScreen.style.display = 'none';
        appEl.style.display = 'grid';
        await loadAndStart();
      } else {
        loginScreen.style.display = 'flex';
        appEl.style.display = 'none';
      }
    });
  } else {
    document.getElementById('login-screen').style.display = 'none';
    document.querySelector('.app').style.display = 'grid';
    loadAndStart();
  }
</script>

function saveStateDebounced() {
  window.__saveDirty = true;

  saveTimer = setTimeout(() => {
    if (window.__saveState) window.__saveState({
      insumos: insumosPrices,
      rendimientos,

      prodRinde,
      platosExtra,
      produccionesExtra,
      recetaRendimientos,
      platosDeleted,
      produccionesDeleted,
      insumosExtra,
      insumosDeleted,
      ventaOverrides

  }, 600);
}

function getAllInsumos() {
  const base = DATA.insumos.filter(i => !insumosDeleted.includes(i.nombre));
  const seen = new Set(base.map(i => i.nombre));
  const extra = insumosExtra.filter(i => !seen.has(i.nombre));
  return [...base, ...extra];
}
function insumoExists(nombre) {
  const n = normName(nombre);
  return getAllInsumos().some(i => normName(i.nombre) === n);
}
function eliminarInsumo(nombre) {
  const refs = findReferencesToProd(nombre);
  if (refs.length) {
    alert(`No se puede eliminar: lo usan en ${refs.join(', ')}. Sacalo de esas recetas primero.`);
    return;
  }
  if (!confirm(`¿Eliminar el insumo "${nombre}"? Esta acción no se puede deshacer.`)) return;
  const idx = insumosExtra.findIndex(i => i.nombre === nombre);
  if (idx >= 0) insumosExtra.splice(idx, 1);
  else if (!insumosDeleted.includes(nombre)) insumosDeleted.push(nombre);
  delete insumosPrices[nombre];
  delete rendimientos[nombre];
  insumoDatalistHTML = null;
  saveStateDebounced();
  renderInsumos();
}

// Rendimiento efectivo de un insumo dentro de una receta/producción puntual:
// el override específico de esa receta si existe, si no el general del insumo
// (ej. limpieza es igual en todos lados, corte puede variar por receta).
function getEffectiveRend(recetaNombre, insumoNombre) {
  const local = recetaRendimientos[recetaNombre] && recetaRendimientos[recetaNombre][insumoNombre];
  return local || rendimientos[insumoNombre] || { enabled: false, factor: 1 };
}

function getPlatoIngredients(nombre) { return recetas[nombre] || DATA.plato_ingredients[nombre] || null; }

function getAllCategorias() {

  Object.entries(DATA.categorias).forEach(([c, arr]) => { merged[c] = arr.filter(nm => !platosDeleted.includes(nm)); });
  platosExtra.forEach(p => {
    if (!merged[p.categoria]) merged[p.categoria] = [];
    merged[p.categoria].push(p.nombre);

function getPlatoMeta(nombre) {
  const base = DATA.platos.find(p => p.nombre === nombre) || platosExtra.find(p => p.nombre === nombre) || null;
  if (!base) return null;
  if (ventaOverrides[nombre] != null) return Object.assign({}, base, { venta: ventaOverrides[nombre] });
  return base;
}
function getAllProdNames() { return [...Object.keys(DATA.sub_blocks).filter(nm => !produccionesDeleted.includes(nm)), ...produccionesExtra]; }
function platoExists(nombre) {
  const n = normName(nombre);
  return DATA.platos.some(p => normName(p.nombre) === n && !platosDeleted.includes(p.nombre)) || platosExtra.some(p => normName(p.nombre) === n);
}

function removeProdFromMap(nombre) {

function findReferencesToProd(nombre) {
  const refs = [];
  DATA.platos.concat(platosExtra).forEach(p => {
    if (platosDeleted.includes(p.nombre)) return;
    const ings = getPlatoIngredients(p.nombre) || [];
    if (ings.some(ing => normName(ing.insumo) === normName(nombre))) refs.push(p.nombre);
  });
  getAllProdNames().forEach(pn => {
    if (normName(pn) === normName(nombre)) return;
    const ings = getProdIngredients(pn) || [];
    if (ings.some(ing => normName(ing.insumo) === normName(nombre))) refs.push(pn);
  });
  return refs;
}

  const idx = produccionesExtra.indexOf(nombre);
  if (idx >= 0) produccionesExtra.splice(idx, 1);
  else if (!produccionesDeleted.includes(nombre)) produccionesDeleted.push(nombre);

  if (!recetas[nombre]) {
    const base = ctx === 'prod' ? DATA.sub_blocks[nombre] : DATA.plato_ingredients[nombre];

function cantidadBruta(recetaNombre, insumoNombre, cantNeta) {
  const r = getEffectiveRend(recetaNombre, insumoNombre);
  if (r.enabled && r.factor > 0 && r.factor < 1) return cantNeta / r.factor;
  return cantNeta;
}

function rendRatio(recetaNombre, insumoNombre) {
  const r = getEffectiveRend(recetaNombre, insumoNombre);
  if (r.enabled && r.factor > 0 && r.factor < 1) return 1 / r.factor;
  return 1;
}

// Costo "horneado": la razón fija cantidad×costo tomada del scrape original.
// Se usa solo como referencia estructural (no cambia con ediciones en vivo).
function costoLineaIngBaked(ing) {
  const unit = (ing.cantidad && ing.costo) ? (ing.costo / ing.cantidad) : 0;
  return (ing.cantidad || 0) * unit;
}

function costoProduccionBaked(nombre) {
  if (prodBaseCost[nombre] != null) return prodBaseCost[nombre];
  const prod = DATA.sub_blocks[nombre];
  const total = prod ? prod.reduce((a, ing) => a + costoLineaIngBaked(ing), 0) : 0;
  prodBaseCost[nombre] = total;
  return total;
}

// Qué fracción de una tanda de producción representa esta línea (fijo, basado
// en las cantidades originales de la receta — no hay dato de "rinde del batch").
function getProdFraction(ing, prodKey) {
  if (prodFractionCache.has(ing)) return prodFractionCache.get(ing);
  const base = costoProduccionBaked(prodKey);
  const frac = (ing.costo != null && base > 0) ? (ing.costo / base) : null;
  prodFractionCache.set(ing, frac);
  return frac;
}

function costoLineaIng(ing, recetaNombre) {
  const prodKey = getProdKey(ing.insumo);
  if (prodKey) {
    const rinde = prodRinde[prodKey];
    if (rinde && rinde.cantidad > 0) {
      const unitCost = costoProduccion(prodKey) / rinde.cantidad;
      return (ing.cantidad || 0) * unitCost * rendRatio(recetaNombre, ing.insumo);
    }
    const frac = getProdFraction(ing, prodKey);
    if (frac != null) return frac * costoProduccion(prodKey) * rendRatio(recetaNombre, ing.insumo);
    // Sin rinde cargado ni costo original horneado (línea nueva) — no se puede inferir el costo.
    const cantB = cantidadBruta(recetaNombre, ing.insumo, ing.cantidad || 0);
    const unit = (ing.cantidad && ing.costo) ? (ing.costo / ing.cantidad) : 0;
    return cantB * unit;
  }
  const liveKey = insumosPricesCI[normName(ing.insumo)];
  const liveCosto = liveKey ? insumosPrices[liveKey].costo : null;
  const unit = liveCosto != null ? liveCosto : ((ing.cantidad && ing.costo) ? (ing.costo / ing.cantidad) : 0);
  const cantB = cantidadBruta(recetaNombre, ing.insumo, ing.cantidad || 0);
  return cantB * unit;
}

function costoPlato(nombre) {
  const ings = getPlatoIngredients(nombre) || [];
  return ings.reduce((a, ing) => a + costoLineaIng(ing, nombre), 0);
}

function costoProduccion(nombre) {
  const prod = getProdIngredients(nombre);
  if (!prod) return 0;
  return prod.reduce((a, ing) => a + costoLineaIng(ing, nombre), 0);
}

function switchTab(tabName) {
  if (tabName !== 'recetas' && tabName !== 'producciones') recipeEditMode = false;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabName + '-section').classList.add('active');
  document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
  if (tabName === 'platos') renderPlatos();
  else if (tabName === 'recetas') renderRecetas();
  else if (tabName === 'producciones') renderProducciones();
  else if (tabName === 'rendimientos') renderRendimientos();
  else if (tabName === 'insumos') renderInsumos();
  else if (tabName === 'exportar') renderExportar();
}

function exportPlatosCSV() {
  const rows = [['Categoría', 'Plato', 'Costo s/IVA', 'Precio Venta', 'Food Cost %']];
  Object.entries(getAllCategorias()).forEach(([c, pn]) => {
    pn.forEach(nm => {
      const p = getPlatoMeta(nm); if (!p) return;
      const hasR = getPlatoIngredients(nm) != null;
      const costoCalc = hasR ? costoPlato(nm) : p.costo;
      const fcCalc = p.venta ? costoCalc / p.venta : null;
      rows.push([cap(c), nm, Math.round(costoCalc || 0), p.venta != null ? Math.round(p.venta) : '', fcCalc != null ? (fcCalc * 100).toFixed(1) : '']);
    });
  });
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell == null ? '' : cell);
    return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(';')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `farda_platos_${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderDetail(nm, type) {
  let ings, venta=null, metaText;
  const ctx = type === 'plato' ? 'plato' : 'prod-recetas';
  if (type === 'plato') {
    const p = getPlatoMeta(nm);
    if (!p) return '<div style="padding:20px;">No encontrado</div>';
    ings = getPlatoIngredients(nm) || [];
    venta = p.venta;
    metaText = 'Plato';
  } else {
    ings = getProdIngredients(nm);
    if (!ings) return '<div style="padding:20px;">Producción no encontrada</div>';
    metaText = 'Producción';
  }

  let tc = 0, ir = '';
  ings.forEach((ing, idx) => {
    const prodKey = getProdKey(ing.insumo);
    const isProd = prodKey != null;
    const liveKey = insumosPricesCI[normName(ing.insumo)];
    const unit = !isProd && liveKey ? insumosPrices[liveKey].costo : ((ing.cantidad && ing.costo) ? (ing.costo / ing.cantidad) : 0);
    const cantB = cantidadBruta(nm, ing.insumo, ing.cantidad || 0);
    const cl = costoLineaIng(ing, nm);
    tc += cl;

    const r = getEffectiveRend(nm, ing.insumo);
    const hasMerma = r.enabled && r.factor > 0 && r.factor < 1;
    const isOverride = !!(recetaRendimientos[nm] && recetaRendimientos[nm][ing.insumo]);

    const nameCell = isProd
      ? `<span class="ing-name clickable" onclick="pushRecipe('prod','${prodKey}')">${ing.insumo}</span><span class="ing-prod-tag">PRODUCCIÓN</span>`
      : `<span class="ing-name">${ing.insumo}</span>`;

    let cantCell;
    if (recipeEditMode) {
      cantCell = `<input class="rend-input-inline" style="width:70px;" type="number" step="any" value="${ing.cantidad != null ? ing.cantidad : ''}" oninput="updateIngCantidad('${nm}', ${idx}, this.value, '${ctx}')">`;
    } else {
      cantCell = `${ing.cantidad != null ? ing.cantidad : '?'}`;
      if (hasMerma && ing.cantidad) cantCell += `<span class="qty-bruta">compra ${fmt3(cantB)}</span>`;
    }

    let unidadCell;
    if (recipeEditMode) {
      unidadCell = `<select class="ins-input" onchange="updateIngUnidad('${nm}', ${idx}, this.value, '${ctx}')">
        <option value="KG" ${ing.unidad==='KG'?'selected':''}>KG</option>
        <option value="LT" ${ing.unidad==='LT'?'selected':''}>LT</option>
        <option value="UNIDAD" ${ing.unidad==='UNIDAD'?'selected':''}>UNIDAD</option>
      </select>`;
    } else {
      unidadCell = ing.unidad;
    }

    let costCell;
    if (hasMerma && unit > 0) {
      costCell = `${fmtDec(unit / r.factor)}/${(ing.unidad||'').toLowerCase()}`;
      if (ing.cantidad != null) costCell += `<span class="usable-price">por receta ${fmtDec(cl)}</span>`;
    } else {
      costCell = ing.cantidad != null ? fmtDec(cl) : '—';
    }

    const delCell = recipeEditMode ? `<td class="td-center"><button class="logout-btn" style="padding:4px 8px;" onclick="removeIngLine('${nm}', ${idx}, '${ctx}')">🗑</button></td>` : '';
    const clearLink = isOverride ? `<button class="logout-btn" style="padding:1px 5px;font-size:9px;" onclick="clearRecetaRend('${nm}','${ing.insumo}','${ctx}')" title="Usar el rendimiento general del insumo">↺ general</button>` : '';

    ir += `<tr>
      <td>${nameCell}</td>
      <td class="ing-qty">${cantCell}</td>
      <td class="ing-qty">${unidadCell}</td>
      <td class="td-center">
        <div class="rend-toggle">
          <label class="switch"><input type="checkbox" ${r.enabled?'checked':''} onchange="toggleRecetaRend('${nm}','${ing.insumo}', this.checked, '${ctx}')"><span class="slider"></span></label>
          <input class="rend-input-inline" type="number" value="${r.factor!=null&&r.factor<1?Math.round(r.factor*100):(r.enabled?100:'')}" placeholder="%" ${!r.enabled?'disabled':''} oninput="setRecetaRend('${nm}','${ing.insumo}', this.value, '${ctx}')">
          <span style="font-size:10px;color:var(--text-ter);">%</span>

      <td class="ing-cost">${costCell}</td>

    </tr>`;
  });

  let addRow = '';
  if (recipeEditMode) {
    const aid = 'addln_' + safeid(nm);
    addRow = `<tr>
      <td><input class="ins-input" style="width:100%;" list="insumo-datalist" id="${aid}_insumo" placeholder="Nombre del insumo/producción" oninput="autofillUnidad('${aid}')"></td>
      <td class="ing-qty"><input class="rend-input-inline" style="width:70px;" type="number" step="any" id="${aid}_cant" placeholder="cant."></td>
      <td class="ing-qty"><select class="ins-input" id="${aid}_unidad"><option value="KG">KG</option><option value="LT">LT</option><option value="UNIDAD">UNIDAD</option></select></td>
      <td></td>
      <td colspan="2" class="td-center"><button class="btn" onclick="addIngLine('${nm}', '${ctx}')">Agregar</button></td>
    </tr>`;
  }

  const fc = venta ? tc / venta : null;
  let summary = `<div class="cost-summary"><div><div class="cost-item-label">Costo total</div><div class="cost-item-value teal">${fmt(tc)}</div></div>`;
  if (venta != null) summary += `<div><div class="cost-item-label">Precio venta</div><div class="cost-item-value">${fmt(venta)}</div></div>`;
  if (fc != null) summary += `<div><div class="cost-item-label">Food Cost</div><div class="cost-item-value">${fcBadge(fc)}</div></div>`;
  if (type === 'prod' && prodRinde[nm] && prodRinde[nm].cantidad > 0) {
    summary += `<div><div class="cost-item-label">Costo por 1 ${prodRinde[nm].unidad}</div><div class="cost-item-value teal">${fmt(tc / prodRinde[nm].cantidad)}</div></div>`;
  }
  summary += `</div>`;

  const colLabel = type === 'plato' ? 'Insumo / Producción' : 'Insumo';
  const editBtn = `<button class="back-btn" onclick="recipeEditMode=!recipeEditMode;renderRecetas()">${recipeEditMode ? '✓ Listo de editar' : '✎ Editar receta'}</button>`;
  const deleteBtn = type === 'plato'
    ? `<button class="logout-btn" style="margin-left:8px;" onclick="eliminarPlato('${nm}')">🗑 Eliminar plato</button>`
    : `<button class="logout-btn" style="margin-left:8px;" onclick="eliminarProduccion('${nm}')">🗑 Eliminar producción</button>`;

  let rindeBlock = '';
  if (type === 'prod') {
    const rinde = prodRinde[nm];
    const sid = safeid(nm);
    if (recipeEditMode) {
      rindeBlock = `<div class="sim-cell" style="margin-bottom:16px;">
        <span style="font-size:12px;color:var(--text-sec);">Rinde este lote:</span>
        <input class="rend-input-inline" style="width:70px;" type="number" step="any" id="${sid}_rinde_cant" value="${rinde ? rinde.cantidad : ''}" oninput="setProdRinde('${nm}', this.value, document.getElementById('${sid}_rinde_unidad').value)">
        <select class="ins-input" id="${sid}_rinde_unidad" onchange="setProdRinde('${nm}', document.getElementById('${sid}_rinde_cant').value, this.value)">
          <option value="KG" ${rinde&&rinde.unidad==='KG'?'selected':''}>KG</option>
          <option value="LT" ${rinde&&rinde.unidad==='LT'?'selected':''}>LT</option>
          <option value="UNIDAD" ${rinde&&rinde.unidad==='UNIDAD'?'selected':''}>UNIDAD</option>
        </select>
      </div>`;
    } else if (rinde) {
      rindeBlock = `<div class="detail-meta">Rinde: ${rinde.cantidad} ${rinde.unidad}</div>`;
    }
  }

  return `<div class="detail-panel">
    <div class="detail-title">${nm}</div>
    <div class="detail-meta">${metaText}</div>
    ${rindeBlock}
    ${editBtn}${deleteBtn}
    <datalist id="insumo-datalist">${getInsumoDatalistHTML()}</datalist>

      <thead><tr><th>${colLabel}</th><th class="right">Cant. receta</th><th class="right">Unidad</th><th class="center">Rendimiento</th><th class="right">Costo línea</th>${recipeEditMode?'<th></th>':''}</tr></thead>
      <tbody>${ir}${addRow}</tbody>

}

function toggleRend(nombre, enabled, ctx) {
  if (!rendimientos[nombre]) rendimientos[nombre] = { enabled: false, factor: 1 };
  rendimientos[nombre].enabled = enabled;
  if (enabled && (!rendimientos[nombre].factor || rendimientos[nombre].factor >= 1)) rendimientos[nombre].factor = 1;
  rerender(ctx);
  saveStateDebounced();
}

function setRend(nombre, val, ctx) {
  if (!rendimientos[nombre]) rendimientos[nombre] = { enabled: true, factor: 1 };
  const f = parseFloat(val) / 100;
  rendimientos[nombre].factor = (f > 0 && f <= 1) ? f : 1;
  clearTimeout(window._rt);
  window._rt = setTimeout(() => rerender(ctx), 600);
  saveStateDebounced();
}

function rerender(ctx) {
  if (ctx === 'prod-producciones') renderProducciones();
  else if (ctx === 'insumos') renderInsumosTable();
  else renderRecetas();
}

function entityKind(ctx) { return ctx === 'plato' ? 'plato' : 'prod'; }

// Rendimiento específico de una receta/producción (no toca el general del insumo).
function toggleRecetaRend(receta, nombre, enabled, ctx) {
  if (!recetaRendimientos[receta]) recetaRendimientos[receta] = {};
  const cur = { ...getEffectiveRend(receta, nombre) };
  cur.enabled = enabled;
  if (enabled && (!cur.factor || cur.factor >= 1)) cur.factor = 1;
  recetaRendimientos[receta][nombre] = cur;
  rerender(ctx);
  saveStateDebounced();
}

function setRecetaRend(receta, nombre, val, ctx) {
  if (!recetaRendimientos[receta]) recetaRendimientos[receta] = {};
  const cur = recetaRendimientos[receta][nombre] || { enabled: true, factor: 1 };
  const f = parseFloat(val) / 100;
  cur.enabled = true;
  cur.factor = (f > 0 && f <= 1) ? f : 1;
  recetaRendimientos[receta][nombre] = cur;
  clearTimeout(window._rt);
  window._rt = setTimeout(() => rerender(ctx), 600);
  saveStateDebounced();
}

function clearRecetaRend(receta, nombre, ctx) {
  if (recetaRendimientos[receta]) delete recetaRendimientos[receta][nombre];
  rerender(ctx);
  saveStateDebounced();
}

function updateIngCantidad(nombre, idx, val, ctx) {
  const arr = ensureRecetaOverride(nombre, entityKind(ctx));
  if (!arr[idx]) return;
  const v = parseFloat(val);
  arr[idx].cantidad = isNaN(v) ? null : v;
  clearTimeout(window._rtq);
  window._rtq = setTimeout(() => rerender(ctx), 600);
  saveStateDebounced();
}

function updateIngUnidad(nombre, idx, val, ctx) {
  const arr = ensureRecetaOverride(nombre, entityKind(ctx));
  if (!arr[idx]) return;
  arr[idx].unidad = val;
  rerender(ctx);
  saveStateDebounced();
}

function removeIngLine(nombre, idx, ctx) {
  const arr = ensureRecetaOverride(nombre, entityKind(ctx));
  arr.splice(idx, 1);
  rerender(ctx);
  saveStateDebounced();
}

function autofillUnidad(aid) {
  const insumoEl = document.getElementById(aid + '_insumo');
  const unidadEl = document.getElementById(aid + '_unidad');
  const val = insumoEl.value.trim();
  if (!val) return;
  const liveKey = insumosPricesCI[normName(val)];
  if (liveKey && insumosPrices[liveKey].unidad) { unidadEl.value = insumosPrices[liveKey].unidad; return; }
  const prodKey = getProdKey(val);
  if (prodKey && prodRinde[prodKey]) unidadEl.value = prodRinde[prodKey].unidad;
}

function addIngLine(nombre, ctx) {
  const prefix = 'addln_' + safeid(nombre);
  const insumoEl = document.getElementById(prefix + '_insumo');
  const cantEl = document.getElementById(prefix + '_cant');
  const unidadEl = document.getElementById(prefix + '_unidad');
  const insumo = insumoEl.value.trim();
  const cantidad = parseFloat(cantEl.value);
  if (!insumo || isNaN(cantidad)) return;
  const esProd = getProdKey(insumo) != null;
  const esInsumo = insumosPricesCI[normName(insumo)] != null;
  if (!esProd && !esInsumo) {
    if (!confirm(`No encontré ningún insumo ni producción llamado exactamente "${insumo}". El costo de esta línea va a dar $0 hasta que el nombre coincida exacto con uno existente. ¿Agregar igual?`)) return;
  }
  const arr = ensureRecetaOverride(nombre, entityKind(ctx));
  arr.push({ insumo, unidad: unidadEl.value, cantidad });
  rerender(ctx);
  saveStateDebounced();
}

function setProdRinde(nombre, cantidadVal, unidad) {
  const v = parseFloat(cantidadVal);
  if (isNaN(v) || v <= 0) delete prodRinde[nombre];
  else prodRinde[nombre] = { cantidad: v, unidad };
  clearTimeout(window._rtr);
  window._rtr = setTimeout(() => { renderRecetas(); renderProducciones(); }, 600);
  saveStateDebounced();
}

// ──── PRODUCCIONES ───────────────────────────────────────────────────────────
let prodStack = [];
let produccionesSearch = '';
function filterProducciones(val) { produccionesSearch = val; renderProduccionesList(); }

function renderProduccionesList() {
  const term = normName(produccionesSearch);
  const names = term ? getAllProdNames().filter(nm => normName(nm).includes(term)) : getAllProdNames();
  let h;
  if (!names.length) {
    h = `<div style="padding:20px;background:var(--bg-alt);border:1px solid var(--border);border-radius:8px;color:var(--text-sec);">Sin resultados.</div>`;
  } else {
    h = '<div class="table-container"><table><thead><tr><th>Producción</th><th class="right">Costo de lote</th><th class="right">Ingredientes</th></tr></thead><tbody>';
    names.forEach(nm => {
      const ings = getProdIngredients(nm) || [];
      const tc = costoProduccion(nm);
      const usaSubProd = ings.some(ing => getProdKey(ing.insumo) != null);
      const tag = usaSubProd ? `<span class="ing-prod-tag">usa producciones</span>` : '';
      h += `<tr><td class="td-name" onclick="openProd('${nm}')">${nm}${tag}</td><td class="td-num">${fmt(tc)}</td><td class="td-num">${ings.length}</td></tr>`;
    });
    h += '</tbody></table></div>';
  }
  document.getElementById('producciones-list').innerHTML = h;
}

function renderProducciones() {
  let h = `<div class="header"><div class="title">Producciones</div><div class="subtitle">Sub-recetas y preparaciones base. Clic para ver el detalle.</div></div>`;
  if (prodStack.length === 0) {
    h += `<div class="detail-panel" style="margin-bottom:20px;padding:16px;"><div class="sim-cell">
      <input class="ins-input" style="width:260px;" type="text" id="new-prod-nombre" placeholder="Nombre de la producción nueva">
      <button class="btn" onclick="crearProduccion()">+ Nueva producción</button>
    </div></div>`;
    h += `<div class="sim-cell" style="margin-bottom:16px;"><input class="ins-input" style="width:280px;" type="text" placeholder="Buscar producción..." value="${produccionesSearch}" oninput="filterProducciones(this.value)"></div>`;
    h += `<div id="producciones-list"></div>`;
    document.getElementById('producciones-section').innerHTML = h;
    renderProduccionesList();
    return;
  } else {
    h += '<div class="crumbs"><span class="crumb" onclick="prodStack=[];recipeEditMode=false;renderProducciones()">Todas las producciones</span>';
    prodStack.forEach((item, idx) => {
      h += '<span class="crumb-sep">/</span>';
      const isLast = idx === prodStack.length - 1;
      h += `<span class="crumb ${isLast?'active':''}" ${!isLast?`onclick="prodStack=prodStack.slice(0,${idx+1});renderProducciones()"`:''}>${item}</span>`;
    });
    h += '</div>';
    if (prodStack.length > 1) h += `<button class="back-btn" onclick="prodStack=prodStack.slice(0,${prodStack.length-1});renderProducciones()">← Volver a ${prodStack[prodStack.length-2]}</button>`;
    else h += `<button class="back-btn" onclick="prodStack=[];recipeEditMode=false;renderProducciones()">← Volver a la lista</button>`;
    h += renderProdDetailTab(prodStack[prodStack.length - 1]);
  }
  document.getElementById('producciones-section').innerHTML = h;
}
function openProd(nm, edit) { prodStack = [nm]; recipeEditMode = !!edit; renderProducciones(); }
function pushProd(nm) { prodStack.push(nm); renderProducciones(); }

function renderProdDetailTab(nm) {
  const prod = getProdIngredients(nm);
  if (!prod) return '<div style="padding:20px;">Producción no encontrada</div>';
  const ctx = 'prod-producciones';
  let tc=0, ir='';
  prod.forEach((ing, idx) => {
    const prodKey = getProdKey(ing.insumo);
    const isSubProd = prodKey != null;
    const liveKey = insumosPricesCI[normName(ing.insumo)];
    const unit = !isSubProd && liveKey ? insumosPrices[liveKey].costo : ((ing.cantidad && ing.costo) ? (ing.costo / ing.cantidad) : 0);
    const cantB = cantidadBruta(nm, ing.insumo, ing.cantidad || 0);
    const cl = costoLineaIng(ing, nm);
    tc += cl;
    const r = getEffectiveRend(nm, ing.insumo);
    const hasMerma = r.enabled && r.factor > 0 && r.factor < 1;
    const isOverride = !!(recetaRendimientos[nm] && recetaRendimientos[nm][ing.insumo]);
    const nameCell = isSubProd
      ? `<span class="ing-name clickable" onclick="pushProd('${prodKey}')">${ing.insumo}</span><span class="ing-prod-tag">PRODUCCIÓN</span>`
      : `<span class="ing-name">${ing.insumo}</span>`;
    let cantCell;
    if (recipeEditMode) {
      cantCell = `<input class="rend-input-inline" style="width:70px;" type="number" step="any" value="${ing.cantidad != null ? ing.cantidad : ''}" oninput="updateIngCantidad('${nm}', ${idx}, this.value, '${ctx}')">`;
    } else {
      cantCell = `${ing.cantidad != null ? ing.cantidad : '?'}`;
      if (hasMerma && ing.cantidad) cantCell += `<span class="qty-bruta">compra ${fmt3(cantB)}</span>`;
    }
    let unidadCell;
    if (recipeEditMode) {
      unidadCell = `<select class="ins-input" onchange="updateIngUnidad('${nm}', ${idx}, this.value, '${ctx}')">
        <option value="KG" ${ing.unidad==='KG'?'selected':''}>KG</option>
        <option value="LT" ${ing.unidad==='LT'?'selected':''}>LT</option>
        <option value="UNIDAD" ${ing.unidad==='UNIDAD'?'selected':''}>UNIDAD</option>
      </select>`;
    } else {
      unidadCell = ing.unidad;
    }
    let costCell;
    if (hasMerma && unit > 0) {
      costCell = `${fmtDec(unit / r.factor)}/${(ing.unidad||'').toLowerCase()}`;
      if (ing.cantidad != null) costCell += `<span class="usable-price">por receta ${fmtDec(cl)}</span>`;
    } else {
      costCell = ing.cantidad != null ? fmtDec(cl) : '—';
    }
    const delCell = recipeEditMode ? `<td class="td-center"><button class="logout-btn" style="padding:4px 8px;" onclick="removeIngLine('${nm}', ${idx}, '${ctx}')">🗑</button></td>` : '';
    const clearLink = isOverride ? `<button class="logout-btn" style="padding:1px 5px;font-size:9px;" onclick="clearRecetaRend('${nm}','${ing.insumo}','${ctx}')" title="Usar el rendimiento general del insumo">↺ general</button>` : '';
    ir += `<tr>
      <td>${nameCell}</td>
      <td class="ing-qty">${cantCell}</td>
      <td class="ing-qty">${unidadCell}</td>
      <td class="td-center">
        <div class="rend-toggle">
          <label class="switch"><input type="checkbox" ${r.enabled?'checked':''} onchange="toggleRecetaRend('${nm}','${ing.insumo}', this.checked, '${ctx}')"><span class="slider"></span></label>
          <input class="rend-input-inline" type="number" value="${r.factor!=null&&r.factor<1?Math.round(r.factor*100):(r.enabled?100:'')}" placeholder="%" ${!r.enabled?'disabled':''} oninput="setRecetaRend('${nm}','${ing.insumo}', this.value, '${ctx}')">
          <span style="font-size:10px;color:var(--text-ter);">%</span>
          ${clearLink}
        </div>
      </td>
      <td class="ing-cost">${costCell}</td>
      ${delCell}
    </tr>`;
  });

  let addRow = '';
  if (recipeEditMode) {
    const aid = 'addln_' + safeid(nm);
    addRow = `<tr>
      <td><input class="ins-input" style="width:100%;" list="insumo-datalist" id="${aid}_insumo" placeholder="Nombre del insumo/producción" oninput="autofillUnidad('${aid}')"></td>
      <td class="ing-qty"><input class="rend-input-inline" style="width:70px;" type="number" step="any" id="${aid}_cant" placeholder="cant."></td>
      <td class="ing-qty"><select class="ins-input" id="${aid}_unidad"><option value="KG">KG</option><option value="LT">LT</option><option value="UNIDAD">UNIDAD</option></select></td>
      <td></td>
      <td colspan="2" class="td-center"><button class="btn" onclick="addIngLine('${nm}', '${ctx}')">Agregar</button></td>
    </tr>`;
  }

  const editBtn = `<button class="back-btn" onclick="recipeEditMode=!recipeEditMode;renderProducciones()">${recipeEditMode ? '✓ Listo de editar' : '✎ Editar receta'}</button>`;
  const deleteBtn = `<button class="logout-btn" style="margin-left:8px;" onclick="eliminarProduccion('${nm}')">🗑 Eliminar producción</button>`;
  const rinde = prodRinde[nm];
  const sid = safeid(nm);
  let rindeBlock;
  if (recipeEditMode) {
    rindeBlock = `<div class="sim-cell" style="margin-bottom:16px;">
      <span style="font-size:12px;color:var(--text-sec);">Rinde este lote:</span>
      <input class="rend-input-inline" style="width:70px;" type="number" step="any" id="${sid}_rinde_cant" value="${rinde ? rinde.cantidad : ''}" oninput="setProdRinde('${nm}', this.value, document.getElementById('${sid}_rinde_unidad').value)">
      <select class="ins-input" id="${sid}_rinde_unidad" onchange="setProdRinde('${nm}', document.getElementById('${sid}_rinde_cant').value, this.value)">
        <option value="KG" ${rinde&&rinde.unidad==='KG'?'selected':''}>KG</option>
        <option value="LT" ${rinde&&rinde.unidad==='LT'?'selected':''}>LT</option>
        <option value="UNIDAD" ${rinde&&rinde.unidad==='UNIDAD'?'selected':''}>UNIDAD</option>
      </select>
    </div>`;
  } else {
    rindeBlock = rinde ? `<div class="detail-meta">Rinde: ${rinde.cantidad} ${rinde.unidad}</div>` : '';
  }

  let summary = `<div class="cost-summary"><div><div class="cost-item-label">Costo de lote</div><div class="cost-item-value teal">${fmt(tc)}</div></div>`;
  if (rinde && rinde.cantidad > 0) {
    summary += `<div><div class="cost-item-label">Costo por 1 ${rinde.unidad}</div><div class="cost-item-value teal">${fmt(tc / rinde.cantidad)}</div></div>`;
  }
  summary += `</div>`;
  return `<div class="detail-panel"><div class="detail-title">${nm}</div><div class="detail-meta">Producción</div>${rindeBlock}${editBtn}${deleteBtn}<datalist id="insumo-datalist">${getInsumoDatalistHTML()}</datalist><table class="ing-table"><thead><tr><th>Insumo</th><th class="right">Cant. receta</th><th class="right">Unidad</th><th class="center">Rendimiento</th><th class="right">Costo línea</th>${recipeEditMode?'<th></th>':''}</tr></thead><tbody>${ir}${addRow}</tbody></table>${summary}</div>`;
}

// ──── RENDIMIENTOS ───────────────────────────────────────────────────────────
function renderRendimientos() {
  let h = `<div class="header"><div class="title">Rendimientos activos</div><div class="subtitle">Generales por insumo (se cargan desde INSUMOS) y específicos por receta/producción.</div></div>`;
  const activos = Object.entries(rendimientos).filter(([k,v]) => v.enabled);
  h += `<div class="cat-header">Generales (todas las recetas)</div>`;
  if (activos.length === 0) {
    h += `<div style="padding: 20px; background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px; color: var(--text-sec);">Sin rendimientos generales activos.</div>`;
  } else {
    h += '<div class="table-container"><table><thead><tr><th>Insumo</th><th class="right">Rinde</th><th class="right">Por cada 1 usable, comprás</th></tr></thead><tbody>';
    activos.forEach(([nombre, v]) => {
      const comprar = v.factor > 0 ? (1/v.factor) : 1;
      h += `<tr><td class="ing-name">${nombre}</td><td class="td-num">${Math.round(v.factor*100)}%</td><td class="td-num">${comprar.toFixed(3).replace('.',',')}</td></tr>`;
    });
    h += '</tbody></table></div>';
  }

  const overrides = [];
  Object.entries(recetaRendimientos).forEach(([receta, insumos]) => {
    Object.entries(insumos || {}).forEach(([insumo, v]) => {
      if (v && v.enabled) overrides.push({ receta, insumo, v });
    });
  });
  h += `<div class="cat-header">Específicos por receta/producción</div>`;
  if (overrides.length === 0) {
    h += `<div style="padding: 20px; background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px; color: var(--text-sec);">Sin overrides específicos.</div>`;
  } else {
    h += '<div class="table-container"><table><thead><tr><th>Receta/producción</th><th>Insumo</th><th class="right">Rinde</th><th class="right">Por cada 1 usable, comprás</th></tr></thead><tbody>';
    overrides.forEach(({ receta, insumo, v }) => {
      const comprar = v.factor > 0 ? (1/v.factor) : 1;
      h += `<tr><td class="ing-name">${receta}</td><td class="ing-name">${insumo}</td><td class="td-num">${Math.round(v.factor*100)}%</td><td class="td-num">${comprar.toFixed(3).replace('.',',')}</td></tr>`;
    });
    h += '</tbody></table></div>';
  }
  document.getElementById('rendimientos-section').innerHTML = h;
}

// ──── INSUMOS (simplificado: sin filtros) ────────────────────────────────────
let insumosSearch = '';
function filterInsumos(val) { insumosSearch = val; renderInsumosTable(); }

function renderInsumos() {
  let h = `<div class="header"><div class="title">Maestro de Insumos</div><div class="subtitle">Total: ${DATA.insumos.length} insumos. Selecciona IVA y actualiza precios.</div></div>`;
  h += `<div class="detail-panel" style="margin-bottom:20px;padding:16px;"><div class="sim-cell" style="flex-wrap:wrap;">
    <input class="ins-input" style="width:220px;" type="text" id="new-insumo-nombre" placeholder="Nombre del insumo nuevo">
    <select class="ins-input" id="new-insumo-unidad"><option value="KG">KG</option><option value="LT">LT</option><option value="UNIDAD">UNIDAD</option></select>
    <input class="ins-input" type="number" id="new-insumo-costo" placeholder="Costo sin IVA">
    <button class="btn" onclick="crearInsumo()">+ Nuevo insumo</button>
  </div></div>`;
  h += `<div class="sim-cell" style="margin-bottom:16px;"><input class="ins-input" style="width:280px;" type="text" placeholder="Buscar insumo..." value="${insumosSearch}" oninput="filterInsumos(this.value)"></div>`;
  h += '<div class="table-container"><table><thead><tr><th>Insumo</th><th class="center">Unidad</th><th class="right">Costo sin IVA ($)</th><th class="center">IVA</th><th class="right">Precio final c/IVA ($)</th><th class="center">Rendimiento general</th><th class="right">Kilo final (usable)</th><th></th></tr></thead><tbody id="insumos-tbody"></tbody></table></div>';
  document.getElementById('insumos-section').innerHTML = h;
  renderInsumosTable();
}

function crearInsumo() {
  const nombreEl = document.getElementById('new-insumo-nombre');
  const nombre = nombreEl.value.trim();
  if (!nombre) return;
  if (insumoExists(nombre)) { alert('Ya existe un insumo con ese nombre.'); return; }
  const unidad = document.getElementById('new-insumo-unidad').value;
  const costoRaw = document.getElementById('new-insumo-costo').value;
  const costo = costoRaw ? parseFloat(costoRaw) : 0;
  insumosExtra.push({ nombre, unidad, costo, iva: 0 });
  insumosPrices[nombre] = { costo, iva: 0, unidad };
  insumosPricesCI[normName(nombre)] = nombre;
  insumoDatalistHTML = null;
  saveStateDebounced();
  renderInsumos();
}

function renderInsumosTable() {
  const seen = new Set();
  const term = normName(insumosSearch);
  let r = '';
  getAllInsumos().forEach(ins => {
    if(seen.has(ins.nombre)) return;
    if(term && !normName(ins.nombre).includes(term)) return;
    seen.add(ins.nombre);
    const ov = insumosPrices[ins.nombre] || { costo: ins.costo, iva: ins.iva, unidad: ins.unidad };
    const iId='ins_'+safeid(ins.nombre), fId=iId+'_final';
    const ivaVal = (ov.iva || 0) * 100;
    const ivaBtn0 = Math.abs(ivaVal - 0) < 0.01 ? 'active' : '';
    const ivaBtn10 = Math.abs(ivaVal - 10.5) < 0.01 ? 'active' : '';
    const ivaBtn21 = Math.abs(ivaVal - 21) < 0.01 ? 'active' : '';
    const finalVal = (ov.costo || 0) * (1 + ivaVal / 100);
    const rr = rendimientos[ins.nombre] || { enabled: false, factor: 1 };
    const unidadActual = ov.unidad || ins.unidad;
    r += `<tr>
      <td>${ins.nombre}</td>
      <td class="td-center">
        <select class="ins-input" onchange="setInsumoUnidad('${ins.nombre}', this.value)">
          <option value="KG" ${unidadActual==='KG'?'selected':''}>KG</option>
          <option value="LT" ${unidadActual==='LT'?'selected':''}>LT</option>
          <option value="UNIDAD" ${unidadActual==='UNIDAD'?'selected':''}>UNIDAD</option>
        </select>
      </td>
      <td class="right"><input class="ins-input" type="number" id="${iId}" value="${ov.costo||''}" data-nombre="${ins.nombre}" oninput="calcFinal('${iId}','${fId}')"></td>
      <td class="td-center">
        <div class="iva-buttons">
          <button class="iva-btn ${ivaBtn0}" onclick="setIVA('${iId}', 0, '${fId}')">0%</button>
          <button class="iva-btn ${ivaBtn10}" onclick="setIVA('${iId}', 10.5, '${fId}')">10.5%</button>
          <button class="iva-btn ${ivaBtn21}" onclick="setIVA('${iId}', 21, '${fId}')">21%</button>
        </div>
      </td>
      <td class="right" id="${fId}">${fmtDec(finalVal)}</td>
      <td class="td-center">
        <div class="rend-toggle">
          <label class="switch"><input type="checkbox" ${rr.enabled?'checked':''} onchange="toggleRend('${ins.nombre}', this.checked, 'insumos')"><span class="slider"></span></label>
          <input class="rend-input-inline" type="number" value="${rr.factor!=null&&rr.factor<1?Math.round(rr.factor*100):(rr.enabled?100:'')}" placeholder="%" ${!rr.enabled?'disabled':''} oninput="setRend('${ins.nombre}', this.value, 'insumos')">
          <span style="font-size:10px;color:var(--text-ter);">%</span>
        </div>
      </td>
      <td class="right">${rr.enabled && rr.factor > 0 && rr.factor < 1 ? fmtDec((ov.costo||0) / rr.factor) : '—'}</td>
      <td class="td-center"><button class="logout-btn" style="padding:4px 8px;" onclick="eliminarInsumo('${ins.nombre}')">🗑</button></td>
    </tr>`;
  });
  const b=document.getElementById('insumos-tbody');
  if(b) b.innerHTML=r;
}

function setInsumoUnidad(nombre, unidad) {
  if (!insumosPrices[nombre]) return;
  insumosPrices[nombre].unidad = unidad;
  saveStateDebounced();
}

function setIVA(inputId, ivaVal, finalId) {
  const btns = event.target.parentElement.querySelectorAll('.iva-btn');
  btns.forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  calcFinal(inputId, finalId, ivaVal);
}

function calcFinal(costoId, finalId, ivaVal) {
  const inp = document.getElementById(costoId);
  const c = parseFloat(inp.value) || 0;
  const nombre = inp && inp.dataset.nombre;
  const prev = nombre ? insumosPrices[nombre] : null;
  const iv = typeof ivaVal === 'number' ? ivaVal : (prev && prev.iva != null ? prev.iva * 100 : 0);
  document.getElementById(finalId).textContent = fmtDec(c * (1 + iv/100));
  if (prev) {
    prev.costo = c;
    if (typeof ivaVal === 'number') prev.iva = ivaVal / 100;
    saveStateDebounced();
  }
}

window.startApp = function (state) {
  state = state || {};
  insumosExtra = state.insumosExtra || [];
  insumosDeleted = state.insumosDeleted || [];
  insumosPrices = {};
  getAllInsumos().forEach(ins => {
    if (!insumosPrices[ins.nombre]) insumosPrices[ins.nombre] = { costo: ins.costo, iva: ins.iva, unidad: ins.unidad };
  });
  Object.entries(state.insumos || {}).forEach(([nombre, v]) => {
    if (insumosPrices[nombre]) insumosPrices[nombre] = { costo: v.costo, iva: v.iva, unidad: v.unidad || insumosPrices[nombre].unidad };
  });
  insumosPricesCI = {};
  Object.keys(insumosPrices).forEach(k => { insumosPricesCI[normName(k)] = k; });
  rendimientos = state.rendimientos || {};
  recetas = state.recetas || {};
  prodRinde = state.prodRinde || {};
  platosExtra = state.platosExtra || [];
  produccionesExtra = state.produccionesExtra || [];
  recetaRendimientos = state.recetaRendimientos || {};
  platosDeleted = state.platosDeleted || [];
  produccionesDeleted = state.produccionesDeleted || [];
  ventaOverrides = state.ventaOverrides || {};
  produccionesExtra.forEach(nm => { if (!prodMapCI[normName(nm)]) prodMapCI[normName(nm)] = nm; });
  produccionesDeleted.forEach(nm => removeProdFromMap(nm));
  insumoDatalistHTML = null;
  renderPlatos();
};

// ──── EXPORTAR ───────────────────────────────────────────────────────────────
function fmtMoney(n) {
  if (n == null || isNaN(n)) return '';
  return Math.round(n).toLocaleString('es-AR');
}

function renderExportar() {
  let h = `<div class="header"><div class="title">Exportar Datos</div><div class="subtitle">Descargá toda la información de platos, recetas, producciones e insumos.</div></div>`;
  h += `<div class="detail-panel" style="max-width:520px;">
    <div class="detail-title" style="font-size:16px;margin-bottom:16px;">Elegí el formato</div>
    <div style="display:flex;gap:12px;margin-bottom:8px;">
      <button class="btn" style="flex:1;padding:14px;font-size:13px;" onclick="exportExcel()">📊 Descargar Excel (.xlsx)</button>
      <button class="btn" style="flex:1;padding:14px;font-size:13px;" onclick="exportPDF()">📄 Descargar PDF</button>
    </div>
    <div style="font-size:12px;color:var(--text-sec);margin-top:16px;line-height:1.6;">
      Incluye: Platos (costo/venta/food cost), Recetas completas con ingredientes y cantidades, Producciones internas, e Insumos (maestro de precios).
    </div>
  </div>`;
  document.getElementById('exportar-section').innerHTML = h;
}

function buildExportData() {
  const platos = [];
  Object.keys(DATA.categorias).forEach(cat => {
    (DATA.categorias[cat] || []).forEach(nombre => {
      if (platosDeleted.includes(nombre)) return;
      const p = getPlatoMeta ? getPlatoMeta(nombre) : null;
      const meta = p || DATA.platos.find(x => x.nombre === nombre) || {};
      platos.push({
        categoria: cat,
        nombre: nombre,
        costo: meta.costo != null ? Math.round(meta.costo * 100) / 100 : '',
        venta: meta.venta != null ? Math.round(meta.venta * 100) / 100 : '',
        fc: meta.fc != null ? Math.round(meta.fc * 10000) / 100 : ''
      });
    });
  });
  platosExtra.forEach(nombre => {
    if (platosDeleted.includes(nombre)) return;
    if (platos.some(x => x.nombre === nombre)) return;
    const meta = (getPlatoMeta ? getPlatoMeta(nombre) : null) || {};
    platos.push({ categoria: 'EXTRA', nombre, costo: meta.costo || '', venta: meta.venta || '', fc: meta.fc ? Math.round(meta.fc*10000)/100 : '' });
  });

  const recetasRows = [];
  platos.forEach(p => {
    const ings = getPlatoIngredients(p.nombre) || [];
    ings.forEach(ing => {
      const cl = costoLineaIng(ing, p.nombre);
      const isProd = getProdKey(ing.insumo) != null;
      recetasRows.push({
        plato: p.nombre,
        insumo: ing.insumo,
        tipo: isProd ? 'Producción' : 'Insumo',
        unidad: ing.unidad || '',
        cantidad: ing.cantidad != null ? ing.cantidad : '',
        costo_linea: Math.round(cl * 100) / 100
      });
    });
  });

  const produccionesRows = [];
  const prodNames = getAllProdNames();
  prodNames.forEach(pn => {
    const ings = getProdIngredients(pn) || [];
    ings.forEach(ing => {
      const cl = costoLineaIng(ing, pn);
      const isProd = getProdKey(ing.insumo) != null;
      produccionesRows.push({
        produccion: pn,
        insumo: ing.insumo,
        tipo: isProd ? 'Producción' : 'Insumo',
        unidad: ing.unidad || '',
        cantidad: ing.cantidad != null ? ing.cantidad : '',
        costo_linea: Math.round(cl * 100) / 100
      });
    });
  });

  const insumosRows = [];
  const seenIns = new Set();
  getAllInsumos().forEach(ins => {
    if (seenIns.has(ins.nombre)) return;
    if (prodMapCI[normName(ins.nombre)]) return;
    seenIns.add(ins.nombre);
    const ov = insumosPrices[ins.nombre] || { costo: ins.costo, iva: ins.iva, unidad: ins.unidad };
    const ivaVal = (ov.iva || 0) * 100;
    const finalVal = (ov.costo || 0) * (1 + ivaVal / 100);
    insumosRows.push({
      nombre: ins.nombre,
      unidad: ov.unidad || ins.unidad,
      costo_sin_iva: Math.round((ov.costo || 0) * 100) / 100,
      iva_pct: ivaVal,
      precio_final: Math.round(finalVal * 100) / 100
    });
  });

  return { platos, recetasRows, produccionesRows, insumosRows };
}

function exportExcel() {
  const { platos, recetasRows, produccionesRows, insumosRows } = buildExportData();
  const wb = XLSX.utils.book_new();

  const wsPlatos = XLSX.utils.json_to_sheet(platos.map(p => ({
    'Categoría': p.categoria, 'Plato': p.nombre, 'Costo sin IVA': p.costo, 'Precio Venta': p.venta, 'Food Cost %': p.fc
  })));
  XLSX.utils.book_append_sheet(wb, wsPlatos, 'PLATOS');

  const wsRecetas = XLSX.utils.json_to_sheet(recetasRows.map(r => ({
    'Plato': r.plato, 'Insumo/Producción': r.insumo, 'Tipo': r.tipo, 'Unidad': r.unidad, 'Cantidad': r.cantidad, 'Costo Línea': r.costo_linea
  })));
  XLSX.utils.book_append_sheet(wb, wsRecetas, 'RECETAS');

  const wsProd = XLSX.utils.json_to_sheet(produccionesRows.map(r => ({
    'Producción': r.produccion, 'Insumo/Producción': r.insumo, 'Tipo': r.tipo, 'Unidad': r.unidad, 'Cantidad': r.cantidad, 'Costo Línea': r.costo_linea
  })));
  XLSX.utils.book_append_sheet(wb, wsProd, 'PRODUCCIONES');

  const wsIns = XLSX.utils.json_to_sheet(insumosRows.map(r => ({
    'Insumo': r.nombre, 'Unidad': r.unidad, 'Costo sin IVA': r.costo_sin_iva, 'IVA %': r.iva_pct, 'Precio Final c/IVA': r.precio_final
  })));
  XLSX.utils.book_append_sheet(wb, wsIns, 'INSUMOS');

  const fecha = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `FARDA_Pricing_${fecha}.xlsx`);
}

    th, td { border:1px solid #ccc; padding:4px 8px; text-align:left; font-size:11px; }
    th { background:#eee; }
    .right { text-align:right; }

  </style></head><body>
  <h1>FARDA — Sistema de Pricing</h1>

  html += `<h2>PLATOS</h2>`;

    });

  });

  html += `<h2>RECETAS</h2>`;
  Object.keys(recetasByPlato).forEach(plato => {
    html += `<div class="block"><h3>${plato}</h3><table><tr><th>Insumo/Producción</th><th>Tipo</th><th>Unidad</th><th class="right">Cantidad</th><th class="right">Costo Línea</th></tr>`;
    recetasByPlato[plato].forEach(r => {
      html += `<tr><td>${r.insumo}</td><td>${r.tipo}</td><td>${r.unidad}</td><td class="right">${r.cantidad}</td><td class="right">$${fmtMoney(r.costo_linea)}</td></tr>`;
    });
    html += `</table></div>`;
  });

  html += `<h2>PRODUCCIONES</h2>`;
  Object.keys(prodByName).forEach(pn => {
    html += `<div class="block"><h3>${pn}</h3><table><tr><th>Insumo/Producción</th><th>Tipo</th><th>Unidad</th><th class="right">Cantidad</th><th class="right">Costo Línea</th></tr>`;
    prodByName[pn].forEach(r => {
      html += `<tr><td>${r.insumo}</td><td>${r.tipo}</td><td>${r.unidad}</td><td class="right">${r.cantidad}</td><td class="right">$${fmtMoney(r.costo_linea)}</td></tr>`;
    });
    html += `</table></div>`;
  });

  html += `<h2>INSUMOS</h2><table><tr><th>Insumo</th><th>Unidad</th><th class="right">Costo s/IVA</th><th class="right">IVA %</th><th class="right">Precio Final</th></tr>`;
  insumosRows.forEach(r => {
    html += `<tr><td>${r.nombre}</td><td>${r.unidad}</td><td class="right">$${fmtMoney(r.costo_sin_iva)}</td><td class="right">${r.iva_pct}%</td><td class="right">$${fmtMoney(r.precio_final)}</td></tr>`;
  });
  html += `</table>`;

  html += `</body></html>`;
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 400);
}
